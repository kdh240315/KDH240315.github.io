            <p class="about-text">
                我是一名热爱数字艺术的创作者，专注于人物插画和抽象艺术领域。多年来，我致力于将传统艺术元素与现代数字绘画技术相结合，创作出具有独特风格的作品。
            </p>
            <p class="about-text" style="margin-top: 20px;">
                我的作品以人物画为主，擅长通过光影和色彩表达人物的情感与气质。每一幅作品都是我对生活、情感和美学的独特诠释。
            </p>
            <p class="about-text" style="margin-top: 20px;">
                希望通过这个网站，与更多热爱艺术的朋友分享我的创作，共同感受数字艺术的魅力。
